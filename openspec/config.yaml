schema: spec-driven

context: |
  EnglishPod 自托管英语学习 Web 应用，未来开源（含多用户）。
  基于已有 365 节播客课程资源（音频、英文 SRT、PDF 讲义）。

  Monorepo 结构:
    apps/web       — React18 + TS + Vite + Tailwind + shadcn/ui + Zustand + TanStack Query
    apps/server    — Node + Hono + TS + Drizzle ORM + SQLite (better-sqlite3)
    tools/preprocess — Python, WhisperX 3.3.2 + LLM 翻译脚本（仅离线，不进运行时镜像）
    packages/types — 前后端共享 TS 类型

  关键约束:
    - 运行时镜像 <500MB（不含 Python/ML 依赖）
    - 句级字幕同步 <200ms；首屏加载 <3s
    - 数据按 user_id 隔离，认证开关化 (AUTH_ENABLED)，单↔多用户无 schema 迁移
    - 课程内容为静态文件经 Docker Volume 挂载（只读），不进库
    - 中文字幕走离线 AI 预生成双语 JSON；逐词高亮 (WhisperX) 可选且自动降级句级
    - 数据库仅存用户产生的数据；vocab 只存引用（lesson_id + 音频时间戳）

  详见 PRD.md 与 docs/superpowers/specs/2026-06-18-englishpod-design.md。

rules:
  proposal:
    - 聚焦“为什么”，实现细节归 design.md
  specs:
    - 场景必须用 4 个井号 (#### Scenario)，否则会静默失败
    - 规范性需求用 SHALL/MUST，每个需求至少一个场景
  tasks:
    - 每个任务可在单次会话内完成且可验证
    - 按依赖顺序排列
